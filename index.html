<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI 計算機</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0f0f1a;
      --bg-card: #1a1a2e;
      --bg-input: #16213e;
      --accent-blue: #4facfe;
      --accent-purple: #b470f7;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b8;
      --border-glow: rgba(79, 172, 254, 0.3);
      --result-under: #00c6ff;
      --result-normal: #00e676;
      --result-over: #ff9100;
      --result-obese: #ff1744;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(79, 172, 254, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(180, 112, 247, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(79, 172, 254, 0.03) 0%, transparent 70%);
      z-index: 0;
      animation: bgShift 15s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-3%, -3%) rotate(3deg); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
    }

    .card {
      background: var(--bg-card);
      border-radius: 24px;
      padding: 48px 40px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 
        0 25px 60px rgba(0,0,0,0.5),
        0 0 80px rgba(79, 172, 254, 0.06),
        inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 32px rgba(79, 172, 254, 0.3);
    }

    .header h1 {
      font-size: 28px;
      font-weight: 900;
      color: var(--text-primary);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .form-label .icon {
      font-size: 16px;
      opacity: 0.8;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      background: var(--bg-input);
      border: 2px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 16px 50px 16px 20px;
      font-size: 18px;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 500;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .input-wrapper input::placeholder {
      color: rgba(255,255,255,0.2);
      font-weight: 300;
    }

    .input-wrapper input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.15), 0 0 20px rgba(79, 172, 254, 0.1);
    }

    .input-wrapper .unit {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      font-weight: 500;
      color: var(--text-secondary);
      pointer-events: none;
    }

    .calc-btn {
      width: 100%;
      padding: 18px;
      margin-top: 8px;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
      box-shadow: 0 8px 30px rgba(79, 172, 254, 0.35);
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      text-transform: uppercase;
    }

    .calc-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(79, 172, 254, 0.45);
    }

    .calc-btn:active {
      transform: translateY(0);
    }

    .result-section {
      margin-top: 32px;
      display: none;
      animation: fadeUp 0.5s ease;
    }

    .result-section.show {
      display: block;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card {
      border-radius: 18px;
      padding: 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      padding: 2px;
      background: linear-gradient(135deg, var(--result-color), transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.6;
    }

    .result-card.under { --result-color: var(--result-under); background: rgba(0, 198, 255, 0.08); }
    .result-card.normal { --result-color: var(--result-normal); background: rgba(0, 230, 118, 0.08); }
    .result-card.over { --result-color: var(--result-over); background: rgba(255, 145, 0, 0.08); }
    .result-card.obese { --result-color: var(--result-obese); background: rgba(255, 23, 68, 0.08); }

    .bmi-number {
      font-size: 72px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--result-color), rgba(255,255,255,0.8));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .bmi-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--result-color);
      margin-bottom: 4px;
    }

    .bmi-category {
      font-size: 20px;
      font-weight: 700;
      color: var(--result-color);
      margin-bottom: 20px;
    }

    .bmi-bar-wrapper {
      margin-top: 16px;
    }

    .bmi-bar-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .bmi-bar-labels span {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .bmi-bar {
      height: 8px;
      border-radius: 4px;
      background: rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }

    .bmi-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--result-color), rgba(255,255,255,0.5));
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    .bmi-bar-marker {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      border: 3px solid var(--result-color);
      box-shadow: 0 0 12px var(--result-color);
      transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      left: 0%;
    }

    .reset-btn {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 2px;
    }

    .reset-btn:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.2);
    }

    .ranges {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin-top: 16px;
    }

    .range-item {
      text-align: center;
      padding: 8px 4px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
    }

    .range-item span {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .range-item.under { color: var(--result-under); background: rgba(0,198,255,0.08); }
    .range-item.normal { color: var(--result-normal); background: rgba(0,230,118,0.08); }
    .range-item.over { color: var(--result-over); background: rgba(255,145,0,0.08); }
    .range-item.obese { color: var(--result-obese); background: rgba(255,23,68,0.08); }

    @media (max-width: 480px) {
      .card { padding: 32px 24px; }
      .header h1 { font-size: 22px; }
      .bmi-number { font-size: 56px; }
      .ranges { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="header-icon">⚖️</div>
        <h1>BMI 計算機</h1>
        <p>了解您的身體質量指數</p>
      </div>

      <div class="form-group">
        <div class="form-label">
          <span class="icon">📏</span> 身高
        </div>
        <div class="input-wrapper">
          <input type="number" id="height" placeholder="170" min="50" max="250" step="0.1">
          <span class="unit">cm</span>
        </div>
      </div>

      <div class="form-group">
        <div class="form-label">
          <span class="icon">⚡</span> 體重
        </div>
        <div class="input-wrapper">
          <input type="number" id="weight" placeholder="65" min="10" max="300" step="0.1">
          <span class="unit">kg</span>
        </div>
      </div>

      <button class="calc-btn" id="calcBtn">計算 BMI</button>

      <div class="result-section" id="resultSection">
        <div class="result-card" id="resultCard">
          <div class="bmi-label">BMI</div>
          <div class="bmi-number" id="bmiNumber">--</div>
          <div class="bmi-category" id="bmiCategory">--</div>

          <div class="bmi-bar-wrapper">
            <div class="bmi-bar-labels">
              <span>過輕</span>
              <span>正常</span>
              <span>過重</span>
              <span>肥胖</span>
            </div>
            <div class="bmi-bar">
              <div class="bmi-bar-fill" id="bmiBarFill"></div>
              <div class="bmi-bar-marker" id="bmiBarMarker"></div>
            </div>
          </div>
        </div>

        <div class="ranges">
          <div class="range-item under"><span>&lt;18.5</span>過輕</div>
          <div class="range-item normal"><span>18.5-24</span>正常</div>
          <div class="range-item over"><span>24-27</span>過重</div>
          <div class="range-item obese"><span>&gt;27</span>肥胖</div>
        </div>

        <button class="reset-btn" id="resetBtn">重新計算</button>
      </div>
    </div>
  </div>

  <script>
    const heightInput = document.getElementById('height');
    const weightInput = document.getElementById('weight');
    const calcBtn = document.getElementById('calcBtn');
    const resultSection = document.getElementById('resultSection');
    const resultCard = document.getElementById('resultCard');
    const bmiNumber = document.getElementById('bmiNumber');
    const bmiCategory = document.getElementById('bmiCategory');
    const bmiBarFill = document.getElementById('bmiBarFill');
    const bmiBarMarker = document.getElementById('bmiBarMarker');
    const resetBtn = document.getElementById('resetBtn');

    // Security: Rate limiting & debounce
    let lastCalcTime = 0;
    const RATE_LIMIT_MS = 1000; // 1 second between calls
    let debounceTimer = null;
    const DEBOUNCE_MS = 300;

    // Security: Max bounds
    const MAX_HEIGHT = 300; // cm
    const MAX_WEIGHT = 500; // kg

    // Security: Toast system (replaces alert())
    function showToast(message, type = 'error') {
      const existing = document.getElementById('toast');
      if (existing) existing.remove();

      const toast = document.createElement('div');
      toast.id = 'toast';
      toast.textContent = message;
      toast.style.cssText = `
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: ${type === 'error' ? '#ff1744' : '#00e676'};
        color: white;
        padding: 14px 24px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        z-index: 9999;
        box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        animation: toastIn 0.3s ease;
      `;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'toastOut 0.3s ease forwards';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    // Inject toast animation styles
    const toastStyle = document.createElement('style');
    toastStyle.textContent = `
      @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
      @keyframes toastOut { from { opacity: 1; transform: translateX(-50%) translateY(0); } to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
    `;
    document.head.appendChild(toastStyle);

    function sanitizeInput(value) {
      // Remove non-numeric characters except decimal point and minus
      const sanitized = String(value).replace(/[^0-9.\-]/g, '');
      return parseFloat(sanitized);
    }

    function validateInput(height, weight) {
      // Check positivity
      if (!height || height <= 0 || !weight || weight <= 0) {
        return { valid: false, error: '請輸入有效的身高和體重' };
      }
      // Check max bounds
      if (height > MAX_HEIGHT) {
        return { valid: false, error: `身高不可超過 ${MAX_HEIGHT} cm` };
      }
      if (weight > MAX_WEIGHT) {
        return { valid: false, error: `體重不可超過 ${MAX_WEIGHT} kg` };
      }
      return { valid: true };
    }

    function getCategory(bmi) {
      if (bmi < 18.5) return { label: '體重過輕', class: 'under', color: '#00c6ff' };
      if (bmi < 24) return { label: '體重正常', class: 'normal', color: '#00e676' };
      if (bmi < 27) return { label: '體重過重', class: 'over', color: '#ff9100' };
      return { label: '肥胖', class: 'obese', color: '#ff1744' };
    }

    function getBarPosition(bmi) {
      if (bmi <= 10) return 0;
      if (bmi >= 40) return 100;
      return ((bmi - 10) / 30) * 100;
    }

    function calculate() {
      const now = Date.now();

      // Security: Rate limiting
      if (now - lastCalcTime < RATE_LIMIT_MS) {
        showToast('請稍後再試', 'error');
        return;
      }
      lastCalcTime = now;

      // Security: Sanitize inputs
      const rawHeight = heightInput.value;
      const rawWeight = weightInput.value;

      const h = sanitizeInput(rawHeight);
      const w = sanitizeInput(rawWeight);

      // Validate inputs
      const validation = validateInput(h, w);
      if (!validation.valid) {
        showToast(validation.error, 'error');
        return;
      }

      const heightInM = h / 100;
      const bmi = w / (heightInM * heightInM);
      const roundedBmi = Math.round(bmi * 10) / 10;
      const cat = getCategory(bmi);

      resultCard.className = 'result-card ' + cat.class;
      bmiNumber.textContent = roundedBmi;
      bmiCategory.textContent = cat.label;

      const barPos = getBarPosition(bmi);

      requestAnimationFrame(() => {
        bmiBarFill.style.width = barPos + '%';
        bmiBarMarker.style.left = barPos + '%';
      });

      resultSection.classList.add('show');
    }

    function debouncedCalculate() {
      // Security: Debounce
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(calculate, DEBOUNCE_MS);
    }

    function reset() {
      heightInput.value = '';
      weightInput.value = '';
      resultSection.classList.remove('show');
      bmiBarFill.style.width = '0%';
      bmiBarMarker.style.left = '0%';
      heightInput.focus();
    }

    // Security: Debounced click handler
    calcBtn.addEventListener('click', debouncedCalculate);
    resetBtn.addEventListener('click', reset);

    heightInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') weightInput.focus(); });
    weightInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') debouncedCalculate(); });
  </script>
</body>
</html>
